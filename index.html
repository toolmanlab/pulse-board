<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📡 Pulse Board</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #161b22;
  --surface-inset: #0d1117;
  --border: #21262d;
  --border-bright: #30363d;

  --text: #e6edf3;
  --text-2: #8b949e;
  --text-3: #484f58;

  --red:   #f85149;
  --yellow: #ffd33d;
  --blue:  #484f58;

  --watch-color:   #ffd33d;
  --discuss-color: #58a6ff;
  --dismiss-color: #da3633;
  --confirm-color: #3fb950;

  --active-bg: #1f6feb;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'PingFang SC', 'SF Pro Text', 'Inter', sans-serif;
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15,17,23,0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-logo { font-size: 22px; }
.header-title { font-size: 17px; font-weight: 600; color: var(--text); }
.header-meta { font-size: 12px; color: var(--text-3); margin-left: auto; }

/* ── Filter bar ── */
.filter-bar {
  padding: 10px 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  background: rgba(15,17,23,0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.filter-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
  min-width: 0;
}
.chips-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.chip-divider {
  width: 1px;
  height: 18px;
  background: var(--border-bright);
  margin: 0 2px;
  flex-shrink: 0;
}
.fchip {
  padding: 5px 13px;
  border-radius: 20px;
  border: 1px solid var(--border-bright);
  background: transparent;
  color: var(--text-2);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.fchip:hover { border-color: var(--text-3); color: var(--text); }
.fchip.active { background: var(--active-bg); border-color: var(--active-bg); color: #fff; font-weight: 600; }
.search {
  margin-left: auto;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border-bright);
  background: var(--surface-inset);
  color: var(--text);
  font-size: 13px;
  outline: none;
  width: 200px;
  transition: border-color .15s;
  flex-shrink: 0;
}
.search:focus { border-color: var(--active-bg); }
.search::placeholder { color: var(--text-3); }

/* domain chips */
.domain-chip {
  padding: 4px 10px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-3);
  font-size: 11px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.domain-chip:hover { border-color: var(--text-3); color: var(--text-2); }
.domain-chip.active { background: rgba(88,166,255,.12); border-color: rgba(88,166,255,.4); color: #58a6ff; font-weight: 600; }

/* ── Stats ── */
.statsbar {
  padding: 8px 24px;
  display: flex;
  gap: 20px;
  font-size: 12px;
  color: var(--text-3);
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.statsbar b { color: var(--text); }

/* ── Grid ── */
.grid-wrap { padding: 20px 24px; }
.date-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 14px;
  margin-top: 6px;
}
.time-label {
  font-size: 11px;
  color: var(--text-3);
  margin-bottom: 10px;
  padding-left: 4px;
  opacity: .7;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
  margin-bottom: 28px;
}

/* ── Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  transition: border-color .18s ease, transform .18s ease, box-shadow .18s ease;
  overflow: hidden;
  position: relative;
}
.card:hover {
  border-color: var(--border-bright);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(0,0,0,.3);
}

/* grade accent bar */
.card::before {
  content: '';
  display: block;
  height: 3px;
  width: 100%;
  flex-shrink: 0;
}
.card.grade-red::before { background: var(--red); }
.card.grade-yellow::before { background: var(--yellow); }
.card.grade-blue::before { background: var(--blue); }

/* status border */
.card.st-watching  { border-color: rgba(255,211,61,.35); }
.card.st-discussed { border-color: rgba(88,166,255,.35); }
.card.st-dismissed { opacity: .3; }
.card.st-confirmed { border-color: rgba(63,185,80,.35); }

.card-body { padding: 16px 16px 0; flex: 1; }

/* grade badge */
.grade-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .04em;
  padding: 3px 9px;
  border-radius: 5px;
  margin-bottom: 10px;
}
.grade-badge.red    { background: rgba(248,81,73,.12); color: var(--red); }
.grade-badge.yellow { background: rgba(255,211,61,.12); color: var(--yellow); }
.grade-badge.blue   { background: rgba(72,79,88,.2);    color: var(--text-3); }

/* push count badge */
.push-count {
  font-size: 10px;
  font-weight: 700;
  color: var(--red);
  background: rgba(248,81,73,.1);
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 6px;
}

.card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 9px;
  text-decoration: none;
  display: block;
}
.card-title:hover { color: #fff; text-decoration: underline; text-underline-offset: 3px; }

.card-summary {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.7;
  margin-bottom: 10px;
}

/* expand toggle button */
.card-expand-toggle {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  color: #58a6ff;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  margin-bottom: 10px;
  transition: color .12s;
}
.card-expand-toggle:hover { color: #79c0ff; }

/* ── Drawer backdrop ── */
.drawer-backdrop {
  position: fixed;
  inset: 0;
  z-index: 999;
  background: rgba(0,0,0,0.5);
  opacity: 0;
  visibility: hidden;
  transition: opacity .3s ease, visibility .3s ease;
}
.drawer-backdrop.open { opacity: 1; visibility: visible; }

/* ── Right-side drawer ── */
.drawer-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 480px;
  height: 100vh;
  z-index: 1000;
  background: var(--surface);
  border-left: 1px solid var(--border);
  box-shadow: -4px 0 24px rgba(0,0,0,.4);
  transform: translateX(100%);
  transition: transform .3s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.drawer-panel.open { transform: translateX(0); }

.drawer-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.drawer-header-info { flex: 1; min-width: 0; }
.drawer-header-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 8px;
}
.drawer-header-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.drawer-header-source {
  font-size: 12px;
  color: var(--text-3);
}
.drawer-header-source a { color: #58a6ff; text-decoration: none; }
.drawer-header-source a:hover { text-decoration: underline; }
.drawer-close {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border-bright);
  background: transparent;
  color: var(--text-2);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all .15s;
}
.drawer-close:hover { background: rgba(255,255,255,.06); color: var(--text); }

.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}
.drawer-body .deep-section { margin-bottom: 16px; }
.drawer-body .deep-section:last-child { margin-bottom: 0; }

.deep-section {
  border-left: 4px solid var(--border);
  padding: 8px 0 8px 14px;
  margin-bottom: 10px;
}
.deep-section:last-child { margin-bottom: 0; }
.deep-section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: .03em;
  margin-bottom: 4px;
}
.deep-section-body { font-size: 13px; color: var(--text-2); }

.deep-section.s-tldr     { border-color: #58a6ff; }
.deep-section.s-signal   { border-color: #3fb950; }
.deep-section.s-analysis { border-color: #d2a8ff; }
.deep-section.s-impact   { border-color: #f85149; }
.deep-section.s-sources  { border-color: #8b949e; }
.deep-section.s-related  { border-color: #f0883e; }

.deep-source-item {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 4px;
}
.deep-source-item:last-child { margin-bottom: 0; }
.deep-source-type {
  font-size: 10px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
  background: rgba(255,255,255,.06);
  color: var(--text-3);
  text-transform: uppercase;
  flex-shrink: 0;
}
.deep-source-item a {
  color: #58a6ff;
  text-decoration: none;
  font-size: 13px;
}
.deep-source-item a:hover { text-decoration: underline; }
.deep-source-note { font-size: 12px; color: var(--text-3); }

.deep-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
.deep-tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  background: rgba(88,166,255,.1);
  color: #58a6ff;
  border: 1px solid rgba(88,166,255,.2);
}

.deep-related-id {
  display: inline-block;
  font-size: 12px;
  font-weight: 600;
  color: #f0883e;
  background: rgba(240,136,62,.1);
  padding: 2px 8px;
  border-radius: 4px;
  margin-right: 6px;
  margin-bottom: 4px;
}

/* domain tag */
.card-domain {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--surface-inset);
  color: var(--text-2);
  border: 1px solid var(--border);
  display: inline-block;
  margin-bottom: 10px;
}

/* source row */
.card-source {
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 10px;
}
.card-source a {
  color: #58a6ff;
  text-decoration: none;
}
.card-source a:hover { text-decoration: underline; }

/* action bar */
.card-actions {
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  border-top: 1px solid var(--border);
}
.action-btn {
  padding: 4px 11px;
  border-radius: 6px;
  border: 1px solid var(--border-bright);
  background: transparent;
  color: var(--text-2);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.action-btn:hover { border-color: var(--text-3); color: var(--text); background: rgba(255,255,255,.04); }
.action-btn.on-watch   { border-color: rgba(255,211,61,.5);  background: rgba(255,211,61,.08);  color: var(--watch-color); }
.action-btn.on-discuss { border-color: rgba(88,166,255,.5);  background: rgba(88,166,255,.08);  color: var(--discuss-color); }
.action-btn.on-dismiss { border-color: rgba(218,54,51,.5);   background: rgba(218,54,51,.08);   color: var(--dismiss-color); }
.action-btn.on-confirm { border-color: rgba(63,185,80,.5);   background: rgba(63,185,80,.08);   color: var(--confirm-color); }
.card-link {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-3);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 3px;
  transition: color .12s;
}
.card-link:hover { color: var(--text-2); }

.empty { text-align: center; padding: 80px; color: var(--text-3); font-size: 15px; }

/* status badge */
.status-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 6px;
}
.status-badge.pushed  { background: rgba(63,185,80,.1); color: #3fb950; }
.status-badge.skipped { background: rgba(72,79,88,.2); color: var(--text-3); }

/* ── Drawer responsive ── */
@media (max-width: 768px) {
  .drawer-panel {
    width: 100%;
    top: auto;
    bottom: 0;
    height: 85vh;
    border-left: none;
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    transform: translateY(100%);
  }
  .drawer-panel.open { transform: translateY(0); }
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .header { padding: 12px; gap: 8px; }
  .header-logo { font-size: 18px; }
  .header-title { font-size: 18px; }
  .header-meta { font-size: 11px; }

  .statsbar {
    padding: 6px 12px;
    display: block;
    font-size: 11px;
    white-space: nowrap;
    overflow-x: auto;
  }
  .statsbar span { display: inline; }
  .statsbar span + span::before { content: ' · '; color: var(--text-3); }

  .filter-bar {
    padding: 8px 12px;
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
  }
  .search { margin-left: 0; width: 100%; }
  .chips-row {
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    gap: 6px;
  }
  .chips-row::-webkit-scrollbar { display: none; }
  .fchip, .domain-chip { padding: 4px 10px; font-size: 12px; flex-shrink: 0; }

  .grid-wrap { padding: 14px 12px; }
  .grid { grid-template-columns: 1fr; gap: 10px; }
  .empty { padding: 40px 12px; }
}
</style>
</head>

  {"id":"ps_20260319_0515_000","date":"2026-03-19","time":"05:15","grade":"🔴","title":"Stripe MPP (Machine Payments Protocol)","source":"","sourceUrl":"","domain":"产品生态","summary":"Stripe + Tempo(区块链) + Visa 联合发布 Agent 支付开放协议。HTTP 402 原生响应，Agent 请求付费资源 → 服务端返回支付请求 → Agent 自动授权 → 完成交易。已上线 Browserbase/PostalForm 等商家。稳定币 + 法币双轨。Agentic Commerce 从概念到金融基础设施落地","insight":"HTTP 402 原生响应，Agent 请求付费资源 → 服务端返回支付请求 → Agent 自动授权。稳定币+法币双轨","routeImpact":"Agentic Commerce 从概念到金融基础设施落地，T2 Agent 工程必知","status":"pushed","pushCount":1,"alexStatus":"unread","deep":{"tldr":"Agent 支付从概念走向金融基础设施，HTTP 402 成为 Agentic Commerce 原生协议","signal":"Stripe + Tempo(区块链) + Visa 联合发布 Machine Payments Protocol (MPP)。技术方案：HTTP 402 原生响应 → Agent 请求付费资源 → 服务端返回支付请求 → Agent 自动授权 → 完成交易。已上线 Browserbase/PostalForm 等商家。支持稳定币+法币双轨。","analysis":"Stripe 是全球最大支付基础设施之一，其入局意味着 Agentic Commerce 从概念验证进入基础设施建设阶段。HTTP 402 状态码原本就是为'需要付费'预留的，现在终于被正式使用。这是 Agent 生态中'Agent 如何花钱'这个关键缺失环节的首个标准化方案。","impact":"T2 Agent 工程必知信号：(1) 面试时展示对 Agent 全栈的理解（不只是 LLM 调用，还有支付/身份/安全），(2) 了解 MPP 协议设计思路，可对标 MCP 的设计哲学（都是 Agent 与外部世界的协议层），(3) 不需要深入实现，但要知道存在。","sources":[{"type":"web","title":"Stripe MPP 官方公告","url":"","note":"HTTP 402 原生支付协议"},{"type":"web","title":"Browserbase 集成案例","url":"","note":"首批商家接入"}],"relatedInsights":[],"tags":["Agentic Commerce","Stripe","HTTP 402","MPP","Agent 支付"]},"shortId":"P125"},
  {"id":"ps_20260319_0515_001","date":"2026-03-19","time":"05:15","grade":"🔴","title":"Snowflake Cortex Code 沙箱逃逸","source":"","sourceUrl":"","domain":"Agent 安全","summary":"PromptArmor 发现：间接 prompt injection 通过 README 触发，process substitution `<()` 绕过命令验证 + 设置 unsandboxed flag 逃出沙箱 + 下载执行恶意代码。50% 复现率。子代理 context loss 导致主代理未发现已执行攻击。已修复(v1.0.25)。Agent 安全攻击面教科书案例","insight":"间接 prompt injection 通过 README 触发，process substitution 绕过命令验证，50% 复现率","routeImpact":"Agent 安全攻击面教科书案例，面试安全话题必备","status":"pushed","pushCount":1,"alexStatus":"unread","deep":{"tldr":"编码 Agent 沙箱逃逸教科书案例，间接 prompt injection + process substitution 组合攻击","signal":"PromptArmor 发现 Snowflake Cortex Code 沙箱逃逸漏洞：间接 prompt injection 通过恶意 README 触发 → process substitution `<()` 绕过命令验证 → 设置 unsandboxed flag 逃出沙箱 → 下载执行恶意代码。50% 复现率。关键：子代理 context loss 导致主代理未发现攻击已执行。已修复 (v1.0.25)。","analysis":"这个漏洞串联了 Agent 安全的多个攻击面：(1) 间接注入（数据层→指令层），(2) 沙箱逃逸（OS 层），(3) 多代理上下文丢失（架构层）。50% 复现率说明这不是理论攻击。修复虽然完成，但攻击模式可复制到其他编码 Agent（Codex/Claude Code/Cursor 等）。","impact":"面试 Agent 安全话题的核心案例：(1) 能具体描述攻击链（injection→escape→execution），(2) 理解 multi-agent context loss 是新攻击面，(3) 能讨论防御策略（沙箱硬隔离 vs 软隔离、输入过滤层级）。面试加分项：能从这个案例延伸到 Agent 安全的系统性思考。","sources":[{"type":"web","title":"PromptArmor 安全报告","url":"","note":"完整漏洞分析 + 复现步骤"},{"type":"web","title":"Snowflake Cortex Code v1.0.25 修复","url":"","note":"官方修复版本"}],"relatedInsights":[],"tags":["Agent 安全","沙箱逃逸","Prompt Injection","Snowflake","PromptArmor"]},"shortId":"P126"},

  {"id":"ps_20260318_1100_000","date":"2026-03-18","time":"11:00","grade":"🔴","title":"GPT-5.4 Mini/Nano","source":"","sourceUrl":"","domain":"其他","summary":"OpenAI 分层 Agent 架构：Mini 54.4% SWE-Bench Pro（接近旗舰 57.7%），Nano $0.20/M 专为子代理。大模型规划+小模型执行成本模型","insight":"Mini 54.4% SWE-Bench Pro（接近旗舰 57.7%），Nano $0.20/M 专为子代理","routeImpact":"大模型规划+小模型执行成本模型，直接影响多 Agent 架构设计","status":"pushed","pushCount":1,"alexStatus":"unread","deep":{"tldr":"OpenAI 分层 Agent 架构落地：大模型规划+小模型执行，直接影响多 Agent 系统设计","signal":"GPT-5.4 Mini 达到 54.4% SWE-Bench Pro（接近旗舰 57.7%），Nano 仅 $0.20/M 专为子代理设计。OpenAI 明确推出'大模型规划+小模型执行'的分层架构：旗舰模型做高级推理和任务规划，Mini/Nano 做具体执行。","analysis":"这验证了 multi-agent 系统的成本优化路径：不需要所有 Agent 都用最贵的模型。SWE-Bench Pro 54.4% vs 57.7% 的差距很小（3.3pp），但成本差异巨大。Nano $0.20/M 使得大规模子代理部署经济可行。这与 Codex Subagents GA 的时间点吻合 — 产品和定价同步就绪。","impact":"直接影响 Agent 架构设计：(1) 面试时能讨论'模型分层'策略（router + planner + executor），(2) 实践中设计 multi-agent 系统时考虑成本分层，(3) 与 GLM-5-Turbo 对比 — 国产 vs OpenAI 在 Agent 定价上的竞争。","sources":[{"type":"web","title":"OpenAI GPT-5.4 系列公告","url":"","note":"Mini/Nano 规格和定价"},{"type":"web","title":"SWE-Bench Pro 评测","url":"","note":"Mini 54.4% vs 旗舰 57.7%"}],"relatedInsights":[],"tags":["GPT-5.4","模型分层","Multi-Agent","成本优化","SWE-Bench"]},"shortId":"P140"},

  {"id":"ps_20260317_1900_000","date":"2026-03-17","time":"19:00","grade":"🔴","title":"Codex Subagents GA","source":"","sourceUrl":"","domain":"Agent 框架","summary":"3/16 GA，多窗口子代理、自定义 agent TOML、cross-thread approval。Multi-agent 从理论到产品落地（与昨天 simonw Sub-agents 章节对齐）","insight":"多窗口子代理、自定义 agent TOML、cross-thread approval","routeImpact":"Multi-agent 从理论到产品落地","status":"pushed","pushCount":1,"alexStatus":"unread","deep":{"tldr":"Multi-agent 从理论到产品落地，Codex Subagents GA 标志着子代理进入生产环境","signal":"Codex Subagents 3/16 GA（正式发布）。核心功能：多窗口子代理并行执行、自定义 agent TOML 配置文件、cross-thread approval（跨线程审批）。与前一天 simonw 发布的 Sub-agents 技术文章时间对齐。","analysis":"Codex 是目前最成熟的编码 Agent 产品之一。Subagents GA 意味着 multi-agent 不再是研究论文概念，而是生产可用的产品特性。agent TOML 配置 = Agent 行为可编程，cross-thread approval = 人类监督机制内置。这设定了'production-ready multi-agent'的产品标准。","impact":"重点关注：(1) 学习 Codex Subagents 的设计模式 — agent TOML 是 Agent 配置的事实标准之一，(2) cross-thread approval 是人类监督（human-in-the-loop）的产品化实现，面试讨论 Agent 安全时可引用，(3) 与 GPT-5.4 Nano 配合 = 完整的'低成本子代理'技术栈。","sources":[{"type":"web","title":"Codex Subagents GA 公告","url":"","note":"3/16 正式发布"},{"type":"web","title":"simonw Sub-agents 技术文章","url":"","note":"时间对齐的独立技术分析"}],"relatedInsights":[],"tags":["Codex","Subagents","Multi-Agent","GA","Agent TOML"]},"shortId":"P145"},
  {"id":"ps_20260317_1900_001","date":"2026-03-17","time":"19:00","grade":"🔴","title":"GLM-5-Turbo","source":"","sourceUrl":"","domain":"国产模型","summary":"智谱专为 Agent 场景训练，744B MoE/40B 激活，tool call 3x 效率，$0.96/M input（GPT-5.4 的 1/8），国产 Agent 模型新标杆","insight":"744B MoE/40B 激活，tool call 3x 效率，$0.96/M input（GPT-5.4 的 1/8）","routeImpact":"国产 Agent 模型新标杆，面试国产模型话题","status":"pushed","pushCount":1,"alexStatus":"unread","deep":{"tldr":"智谱 GLM-5-Turbo 专为 Agent 训练，tool call 效率 3x，定价仅 GPT-5.4 的 1/8","signal":"智谱发布 GLM-5-Turbo：744B MoE / 40B 激活参数，专为 Agent 场景训练，tool call 效率提升 3 倍，定价 $0.96/M input（GPT-5.4 Mini 的约 1/8）。国产模型首次明确以'Agent 专用'为定位发布。","analysis":"GLM-5-Turbo 的定位非常精准：不争旗舰排行榜，专攻 Agent 场景的性价比。744B MoE / 40B 激活 = 推理成本可控，tool call 3x 效率 = Agent 场景关键指标。$0.96/M 的定价对标 GPT-5.4 Nano ($0.20/M) 虽然贵 4.8x，但 tool call 效率可能弥补差距。这是国产模型在 Agent 赛道的差异化策略。","impact":"面试国产模型话题的核心案例：(1) 能对比 GLM-5-Turbo vs GPT-5.4 Mini/Nano 的定位差异，(2) 理解'Agent 专用训练'vs '通用模型+Agent 微调'的路线之争，(3) tool call 效率是 Agent 模型的关键评估维度 — 面试时可以展开讨论。与 I004（国产模型竞争）直接相关。","sources":[{"type":"web","title":"智谱 GLM-5-Turbo 发布公告","url":"","note":"规格和定价"},{"type":"web","title":"GLM-5-Turbo Agent 场景评测","url":"","note":"tool call 效率 3x"}],"relatedInsights":["I004"],"tags":["GLM-5-Turbo","智谱","Agent 专用","MoE","国产模型","Tool Call"]},"shortId":"P146"},

// ─── State ──────────────────────────────────────────────────────────────────
const SK = 'pulse_v1';
let S = JSON.parse(localStorage.getItem(SK)||'{}');
const getS = id => (S[id]||{alexStatus:'unread'}).alexStatus;
const setS = (id,st) => { S[id]={alexStatus:st}; localStorage.setItem(SK,JSON.stringify(S)); };

// Initialize state from data alexStatus
DATA.forEach(d => {
  if (!S[d.id] && d.alexStatus !== 'unread') {
    S[d.id] = { alexStatus: d.alexStatus };
  }
});
localStorage.setItem(SK, JSON.stringify(S));

// ─── Filter ─────────────────────────────────────────────────────────────────
let curFilter = 'all', curDomain = '', curQ = '';
const gradeKey = g => g==='🔴'?'red':g==='🟡'?'yellow':'blue';

function matches(d) {
  const st = getS(d.id);
  const gk = gradeKey(d.grade);
  if (curFilter==='unread' && st!=='unread') return false;
  if (curFilter==='watching' && st!=='watching') return false;
  if (curFilter==='discussed' && st!=='discussed') return false;
  if (curFilter==='dismissed' && st!=='dismissed') return false;
  if (curFilter==='confirmed' && st!=='confirmed') return false;
  if (curFilter==='red' && gk!=='red') return false;
  if (curFilter==='yellow' && gk!=='yellow') return false;
  if (curFilter==='skipped' && d.status!=='skipped') return false;
  if (curDomain && d.domain!==curDomain) return false;
  if (curQ) {
    const hay = (d.title+' '+d.summary+' '+(d.insight||'')+' '+(d.source||'')+' '+(d.domain||'')).toLowerCase();
    if (!hay.includes(curQ.toLowerCase())) return false;
  }
  return true;
}

// ─── Domain chips ───────────────────────────────────────────────────────────
function buildDomainChips() {
  const domains = [...new Set(DATA.map(d=>d.domain))].filter(Boolean).sort();
  const container = document.getElementById('domainChips');
  container.innerHTML = domains.map(d =>
    `<button class="domain-chip" data-domain="${d}">${d}</button>`
  ).join('');
  container.querySelectorAll('[data-domain]').forEach(btn => {
    btn.addEventListener('click', () => {
      const active = btn.classList.contains('active');
      container.querySelectorAll('.domain-chip').forEach(b=>b.classList.remove('active'));
      if (!active) { btn.classList.add('active'); curDomain = btn.dataset.domain; }
      else { curDomain = ''; }
      render();
    });
  });
}

// ─── Render ─────────────────────────────────────────────────────────────────
function render() {
  updateStats();
  const wrap = document.getElementById('gridWrap');
  const filtered = DATA.filter(matches);
  document.getElementById('sShown').textContent = filtered.length;

  if (!filtered.length) {
    wrap.innerHTML = '<div class="empty">没有符合条件的条目</div>';
    return;
  }

  // Group by date, then by time within date
  const byDate = {};
  filtered.forEach(d => { (byDate[d.date]||(byDate[d.date]=[])).push(d); });
  const dates = Object.keys(byDate).sort((a,b)=>b.localeCompare(a));

  const today = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);

  wrap.innerHTML = dates.map(date => {
    const dateItems = byDate[date];
    const dayLabel = date===today ? '今天' : date===yesterday ? '昨天' : '';
    const fmtDate = `${date.slice(0,4)}年${parseInt(date.slice(5,7))}月${parseInt(date.slice(8,10))}日`;
    const label = dayLabel ? `${dayLabel} · ${fmtDate}` : fmtDate;

    // Group by time within date
    const byTime = {};
    dateItems.forEach(d => { (byTime[d.time]||(byTime[d.time]=[])).push(d); });
    const times = Object.keys(byTime).sort((a,b)=>b.localeCompare(a));

    const timeBlocks = times.map(time => {
      return `<div class="time-label">${time} 采集</div>
        <div class="grid">${byTime[time].map(cardHTML).join('')}</div>`;
    }).join('');

    return `<div class="date-label">${label}</div>${timeBlocks}`;
  }).join('');

  bindEvents(wrap);
}

function cardHTML(d) {
  const st = getS(d.id);
  const gk = gradeKey(d.grade);
  const gradeLabel = gk==='red'?'🔴 路线级':gk==='yellow'?'🟡 值得了解':'🔵 参考';
  const stCls = st==='watching'?' st-watching':st==='discussed'?' st-discussed':st==='dismissed'?' st-dismissed':st==='confirmed'?' st-confirmed':'';
  const pushCountBadge = d.pushCount > 1 ? `<span class="push-count">[×${d.pushCount}]</span>` : '';
  const statusBadge = `<span class="status-badge ${d.status}">${d.status==='pushed'?'已推送':'已跳过'}</span>`;
  const hasDeep = d.deep && (d.deep.tldr || d.deep.signal || d.deep.analysis || d.deep.impact || (d.deep.sources && d.deep.sources.length));
  const hasLegacyDetail = d.insight || d.routeImpact;
  const hasDetail = hasDeep || hasLegacyDetail;

  // Source link
  let sourceHtml = '';
  if (d.source) {
    if (d.sourceUrl) {
      sourceHtml = `<div class="card-source">来源：<a href="${d.sourceUrl}" target="_blank" rel="noopener">${d.source}</a></div>`;
    } else {
      sourceHtml = `<div class="card-source">来源：${d.source}</div>`;
    }
  }

  return `
<div class="card grade-${gk}${stCls}" id="card-${d.id}">
  <div class="card-body">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px">
      <div style="display:flex;align-items:center">
        ${d.shortId ? `<span style="font-size:11px;font-weight:600;color:var(--text-2);margin-right:6px;font-family:monospace">${d.shortId}</span>` : ''}
        <div class="grade-badge ${gk}">${gradeLabel}</div>
        ${pushCountBadge}
        ${statusBadge}
      </div>
      <span style="font-size:11px;color:#484f58">${d.time}</span>
    </div>
    <a class="card-title" href="${d.sourceUrl||'#'}" target="_blank" rel="noopener">${d.title}</a>
    <div class="card-summary">${d.summary}</div>
    ${d.domain ? `<span class="card-domain">${d.domain}</span>` : ''}
    ${sourceHtml}
    ${hasDetail ? `<button class="card-expand-toggle" data-expand="${d.id}">查看分析 →</button>` : ''}
  </div>
  <div class="card-actions">
    <button class="action-btn${st==='watching'?' on-watch':''}" data-act="watching" data-id="${d.id}">👀 关注</button>
    <button class="action-btn${st==='discussed'?' on-discuss':''}" data-act="discussed" data-id="${d.id}">💬 讨论</button>
    <button class="action-btn${st==='confirmed'?' on-confirm':''}" data-act="confirmed" data-id="${d.id}">✓ 确认</button>
    <button class="action-btn${st==='dismissed'?' on-dismiss':''}" data-act="dismissed" data-id="${d.id}">✕ 忽略</button>
    ${d.sourceUrl ? `<a class="card-link" href="${d.sourceUrl}" target="_blank" rel="noopener">打开 ↗</a>` : ''}
  </div>
</div>`;
}

function drawerContentHTML(d) {
  const hasDeep = d.deep && (d.deep.tldr || d.deep.signal || d.deep.analysis || d.deep.impact || (d.deep.sources && d.deep.sources.length));
  if (hasDeep) {
    const dp = d.deep;
    let sections = '';
    if (dp.tldr) sections += `<div class="deep-section s-tldr"><div class="deep-section-title">TL;DR</div><div class="deep-section-body">${dp.tldr}</div></div>`;
    if (dp.signal) sections += `<div class="deep-section s-signal"><div class="deep-section-title">📊 信号</div><div class="deep-section-body">${dp.signal}</div></div>`;
    if (dp.analysis) sections += `<div class="deep-section s-analysis"><div class="deep-section-title">🔍 分析</div><div class="deep-section-body">${dp.analysis}</div></div>`;
    if (dp.impact) sections += `<div class="deep-section s-impact"><div class="deep-section-title">🎯 路线影响</div><div class="deep-section-body">${dp.impact}</div></div>`;
    if (dp.sources && dp.sources.length) {
      const items = dp.sources.map(s => {
        let label = s.note || s.title || s.handle || s.type;
        let link = '';
        if (s.url) {
          link = `<a href="${s.url}" target="_blank" rel="noopener">${label}</a>`;
        } else if (s.type === 'hn' && s.id) {
          link = `<a href="https://news.ycombinator.com/item?id=${s.id}" target="_blank" rel="noopener">${label}${s.points ? ` (${s.points}pt/${s.comments}c)` : ''}</a>`;
        } else {
          link = `<span class="deep-source-note">${label}</span>`;
        }
        return `<div class="deep-source-item"><span class="deep-source-type">${s.type}</span>${link}</div>`;
      }).join('');
      sections += `<div class="deep-section s-sources"><div class="deep-section-title">📎 来源</div><div class="deep-section-body">${items}</div></div>`;
    }
    if (dp.relatedInsights && dp.relatedInsights.length) {
      const ids = dp.relatedInsights.map(id => `<span class="deep-related-id">${id}</span>`).join('');
      sections += `<div class="deep-section s-related"><div class="deep-section-title">🔗 关联 Insight</div><div class="deep-section-body">${ids}</div></div>`;
    }
    let tags = '';
    if (dp.tags && dp.tags.length) {
      tags = `<div class="deep-tags">${dp.tags.map(t => `<span class="deep-tag">${t}</span>`).join('')}</div>`;
    }
    return sections + tags;
  }
  // Legacy fallback
  let html = '';
  if (d.insight) html += `<div class="deep-section s-analysis"><div class="deep-section-title">核心观点</div><div class="deep-section-body">${d.insight}</div></div>`;
  if (d.routeImpact) html += `<div class="deep-section s-impact"><div class="deep-section-title">路线影响</div><div class="deep-section-body">${d.routeImpact}</div></div>`;
  return html;
}

// ── Drawer ──
function openDrawer(d) {
  const gk = gradeKey(d.grade);
  const gradeLabel = gk==='red'?'🔴 路线级':gk==='yellow'?'🟡 值得了解':'🔵 参考';
  document.getElementById('drawerTitle').textContent = (d.shortId ? d.shortId + '  ' : '') + d.title;
  let metaHTML = `<div class="grade-badge ${gk}">${gradeLabel}</div>`;
  if (d.source) {
    if (d.sourceUrl) {
      metaHTML += `<span class="drawer-header-source">来源：<a href="${d.sourceUrl}" target="_blank" rel="noopener">${d.source}</a></span>`;
    } else {
      metaHTML += `<span class="drawer-header-source">来源：${d.source}</span>`;
    }
  }
  document.getElementById('drawerMeta').innerHTML = metaHTML;
  document.getElementById('drawerBody').innerHTML = drawerContentHTML(d);
  document.getElementById('drawerPanel').classList.add('open');
  document.getElementById('drawerBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawerPanel').classList.remove('open');
  document.getElementById('drawerBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('drawerBackdrop').addEventListener('click', closeDrawer);
document.getElementById('drawerClose').addEventListener('click', closeDrawer);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

function bindEvents(wrap) {
  wrap.querySelectorAll('[data-act]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const {id, act} = btn.dataset;
      setS(id, getS(id)===act ? 'unread' : act);
      render();
    });
  });
  wrap.querySelectorAll('[data-expand]').forEach(btn => {
    btn.addEventListener('click', () => {
      const d = DATA.find(item => item.id === btn.dataset.expand);
      if (d) openDrawer(d);
    });
  });
}

function updateStats() {
  const total = DATA.length;
  document.getElementById('sTot').textContent = total;
  document.getElementById('sRed').textContent = DATA.filter(d=>d.grade==='🔴').length;
  document.getElementById('sYellow').textContent = DATA.filter(d=>d.grade==='🟡').length;
  document.getElementById('sSkipped').textContent = DATA.filter(d=>d.status==='skipped').length;
  document.getElementById('sConfirmed').textContent = DATA.filter(d=>getS(d.id)==='confirmed').length;
  document.getElementById('metaText').textContent = '最后同步：2026-03-27 18:31';
}

// ─── Events ─────────────────────────────────────────────────────────────────
document.querySelectorAll('[data-f]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-f]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    curFilter = btn.dataset.f;
    render();
  });
});
document.getElementById('searchInput').addEventListener('input', e => {
  curQ = e.target.value;
  render();
});

buildDomainChips();
render();
</script>
